services:
  oncoassist:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oncoassist
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      
      # Router HTTP
      - "traefik.http.routers.oncoassist.rule=Host(`oncoassist.lzmweb.site`)"
      - "traefik.http.routers.oncoassist.entrypoints=web"
      
      # Router HTTPS (SSL automático)
      - "traefik.http.routers.oncoassist-secure.rule=Host(`oncoassist.lzmweb.site`)"
      - "traefik.http.routers.oncoassist-secure.entrypoints=websecure"
      - "traefik.http.routers.oncoassist-secure.tls=true"
      - "traefik.http.routers.oncoassist-secure.tls.certresolver=letsencryptresolver"
      
      # Service
      - "traefik.http.services.oncoassist.loadbalancer.server.port=80"
      
    networks:
      - traefik

networks:
  traefik:
    external: true
